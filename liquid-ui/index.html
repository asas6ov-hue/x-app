<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid UI - Revolutionary Water Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffffff;
        }

        .liquid-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Water background effect */
        .water-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 100, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 200, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 50, 100, 0.15) 0%, transparent 70%);
            z-index: 1;
        }

        /* Glass panel */
        .glass-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 2;
            overflow: hidden;
        }

        /* Ripple canvas */
        #rippleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 4;
            padding: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        /* Theme droplets */
        .themes-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .theme-droplet {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.3),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .theme-droplet:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .theme-droplet::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(2px);
        }

        /* Theme colors */
        .theme-cool-blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .theme-deep-green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .theme-cosmic-black { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); }
        .theme-ocean-purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .theme-sunset-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .theme-arctic-cyan { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .theme-midnight-blue { background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%); }
        .theme-emerald { background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%); }
        .theme-rose { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .theme-gold { background: linear-gradient(135deg, #f09819 0%, #edde5d 100%); }

        /* Stats section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Launch button */
        .launch-section {
            display: flex;
            justify-content: center;
            margin-top: auto;
        }

        .launch-btn {
            padding: 15px 60px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #ffffff;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .launch-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3);
        }

        .launch-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .launch-btn:hover::before {
            left: 100%;
        }

        /* Mini overlay version */
        .mini-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            display: none;
        }

        .mini-overlay.active {
            display: block;
        }

        .mini-stat {
            font-size: 1.8em;
            font-weight: 300;
            margin: 10px 0;
            text-align: right;
            letter-spacing: 2px;
        }

        /* Instructions */
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 100;
            text-align: center;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="liquid-container">
        <div class="water-background"></div>
        
        <div class="glass-panel">
            <canvas id="rippleCanvas"></canvas>
            
            <div class="content">
                <div class="header">
                    <h1>Liquid UI</h1>
                    <p>Revolutionary Water Interface Experience</p>
                </div>

                <div class="themes-section">
                    <div class="theme-droplet theme-cool-blue" data-theme="cool-blue"></div>
                    <div class="theme-droplet theme-deep-green" data-theme="deep-green"></div>
                    <div class="theme-droplet theme-cosmic-black" data-theme="cosmic-black"></div>
                    <div class="theme-droplet theme-ocean-purple" data-theme="ocean-purple"></div>
                    <div class="theme-droplet theme-sunset-orange" data-theme="sunset-orange"></div>
                    <div class="theme-droplet theme-arctic-cyan" data-theme="arctic-cyan"></div>
                    <div class="theme-droplet theme-midnight-blue" data-theme="midnight-blue"></div>
                    <div class="theme-droplet theme-emerald" data-theme="emerald"></div>
                    <div class="theme-droplet theme-rose" data-theme="rose"></div>
                    <div class="theme-droplet theme-gold" data-theme="gold"></div>
                </div>

                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-value" id="fps">144</div>
                        <div class="stat-label">FPS</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="cpu">23%</div>
                        <div class="stat-label">CPU</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="gpu">45%</div>
                        <div class="stat-label">GPU</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="ram">8.2GB</div>
                        <div class="stat-label">RAM</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="upload">25</div>
                        <div class="stat-label">Upload Mbps</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="download">150</div>
                        <div class="stat-label">Download Mbps</div>
                    </div>
                </div>

                <div class="launch-section">
                    <button class="launch-btn" id="launchBtn">Launch Overlay</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mini Overlay -->
    <div class="mini-overlay" id="miniOverlay">
        <div class="mini-stat" id="mini-fps">144</div>
        <div class="mini-stat" id="mini-cpu">23%</div>
        <div class="mini-stat" id="mini-gpu">45%</div>
        <div class="mini-stat" id="mini-ram">8.2GB</div>
        <div class="mini-stat" id="mini-upload">25</div>
        <div class="mini-stat" id="mini-download">150</div>
    </div>

    <div class="instructions">
        Move your mouse over the interface to see water ripple effects • Click theme droplets to change colors • Click Launch Overlay for mini view
    </div>

    <script>
        // Ripple Effect System
        class RippleSystem {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.ripples = [];
                this.animationId = null;
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Mouse interaction
                this.canvas.parentElement.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    this.createRipple(x, y);
                });

                this.animate();
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }

            createRipple(x, y) {
                const ripple = {
                    x: x,
                    y: y,
                    radius: 0,
                    maxRadius: 150,
                    speed: 2,
                    opacity: 0.8,
                    width: 3
                };
                this.ripples.push(ripple);
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let i = this.ripples.length - 1; i >= 0; i--) {
                    const ripple = this.ripples[i];
                    
                    ripple.radius += ripple.speed;
                    ripple.opacity = 0.8 * (1 - ripple.radius / ripple.maxRadius);
                    ripple.width = 3 * (1 - ripple.radius / ripple.maxRadius);
                    
                    if (ripple.radius >= ripple.maxRadius) {
                        this.ripples.splice(i, 1);
                        continue;
                    }
                    
                    this.ctx.beginPath();
                    this.ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
                    this.ctx.strokeStyle = `rgba(100, 200, 255, ${ripple.opacity})`;
                    this.ctx.lineWidth = ripple.width;
                    this.ctx.stroke();
                    
                    // Inner glow
                    this.ctx.beginPath();
                    this.ctx.arc(ripple.x, ripple.y, ripple.radius * 0.9, 0, Math.PI * 2);
                    this.ctx.strokeStyle = `rgba(255, 255, 255, ${ripple.opacity * 0.3})`;
                    this.ctx.lineWidth = ripple.width * 0.5;
                    this.ctx.stroke();
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }
        }

        // Initialize ripple system
        const rippleSystem = new RippleSystem('rippleCanvas');

        // Theme switching
        const themeDroplets = document.querySelectorAll('.theme-droplet');
        const glassPanel = document.querySelector('.glass-panel');

        themeDroplets.forEach(droplet => {
            droplet.addEventListener('click', () => {
                const theme = droplet.dataset.theme;
                let gradient;
                
                switch(theme) {
                    case 'cool-blue':
                        gradient = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                        break;
                    case 'deep-green':
                        gradient = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                        break;
                    case 'cosmic-black':
                        gradient = 'linear-gradient(135deg, #2c3e50 0%, #000000 100%)';
                        break;
                    case 'ocean-purple':
                        gradient = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                        break;
                    case 'sunset-orange':
                        gradient = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                        break;
                    case 'arctic-cyan':
                        gradient = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                        break;
                    case 'midnight-blue':
                        gradient = 'linear-gradient(135deg, #0f0c29 0%, #302b63 100%)';
                        break;
                    case 'emerald':
                        gradient = 'linear-gradient(135deg, #0ba360 0%, #3cba92 100%)';
                        break;
                    case 'rose':
                        gradient = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
                        break;
                    case 'gold':
                        gradient = 'linear-gradient(135deg, #f09819 0%, #edde5d 100%)';
                        break;
                }
                
                document.body.style.background = gradient;
                
                // Create ripple effect on click
                const rect = droplet.getBoundingClientRect();
                const parentRect = glassPanel.getBoundingClientRect();
                const x = rect.left + rect.width/2 - parentRect.left;
                const y = rect.top + rect.height/2 - parentRect.top;
                
                for(let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        rippleSystem.createRipple(x, y);
                    }, i * 100);
                }
            });
        });

        // Simulate real-time stats
        function updateStats() {
            const stats = {
                fps: Math.floor(Math.random() * 30) + 120,
                cpu: Math.floor(Math.random() * 40) + 15,
                gpu: Math.floor(Math.random() * 30) + 35,
                ram: (Math.random() * 4 + 6).toFixed(1),
                upload: Math.floor(Math.random() * 20) + 20,
                download: Math.floor(Math.random() * 100) + 100
            };

            document.getElementById('fps').textContent = stats.fps;
            document.getElementById('cpu').textContent = stats.cpu + '%';
            document.getElementById('gpu').textContent = stats.gpu + '%';
            document.getElementById('ram').textContent = stats.ram + 'GB';
            document.getElementById('upload').textContent = stats.upload;
            document.getElementById('download').textContent = stats.download;

            // Update mini overlay
            document.getElementById('mini-fps').textContent = stats.fps;
            document.getElementById('mini-cpu').textContent = stats.cpu + '%';
            document.getElementById('mini-gpu').textContent = stats.gpu + '%';
            document.getElementById('mini-ram').textContent = stats.ram + 'GB';
            document.getElementById('mini-upload').textContent = stats.upload;
            document.getElementById('mini-download').textContent = stats.download;
        }

        setInterval(updateStats, 2000);

        // Launch overlay functionality
        const launchBtn = document.getElementById('launchBtn');
        const miniOverlay = document.getElementById('miniOverlay');
        const glassPanel = document.querySelector('.glass-panel');

        launchBtn.addEventListener('click', () => {
            miniOverlay.classList.toggle('active');
            
            // Create ripple effect
            const rect = launchBtn.getBoundingClientRect();
            const parentRect = glassPanel.getBoundingClientRect();
            const x = rect.left + rect.width/2 - parentRect.left;
            const y = rect.top + rect.height/2 - parentRect.top;
            
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    rippleSystem.createRipple(x, y);
                }, i * 80);
            }
        });

        // Mini overlay ripple effect
        miniOverlay.addEventListener('mousemove', (e) => {
            const rect = miniOverlay.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Create smaller ripples for mini overlay
            const miniRipple = {
                x: x,
                y: y,
                radius: 0,
                maxRadius: 50,
                speed: 1.5,
                opacity: 0.6,
                width: 2
            };
            
            // Note: This is a simplified version for the mini overlay
            // In a full implementation, you'd have a separate canvas for the mini overlay
        });
    </script>
</body>
</html>
